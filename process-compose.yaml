version: "0.5"

processes:
  jss:
    command: aleph-jss
    readiness_probe:
      http_get:
        host: localhost
        port: 3000
        path: /
      initial_delay_seconds: 1
      period_seconds: 2
      failure_threshold: 10

  seed:
    command: aleph-seed
    depends_on:
      jss:
        condition: process_healthy
    availability:
      restart: "no"

  vite:
    command: bun run dev
    depends_on:
      seed:
        condition: process_completed_successfully
    environment:
      - VITE_POD_BASE=http://localhost:3000

  agent-daemon:
    # Node, not Bun: Comunica's HTTP actor needs undici.cacheStores, which
    # Bun's built-in undici shim doesn't expose. tsx is the TS loader — it
    # transforms TS (incl. parameter properties) and resolves the daemon's
    # extensionless imports, which Node's strict ESM resolver rejects.
    command: node --import tsx src/daemon/main.ts
    depends_on:
      seed:
        condition: process_completed_successfully
    environment:
      - POD_BASE=http://localhost:3000
      - COMUNICA_SOURCES=https://dbpedia.org/sparql,https://query.wikidata.org/sparql
